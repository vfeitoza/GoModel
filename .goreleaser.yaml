version: 2

project_name: gomodel

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    main: ./cmd/gomodel
    ldflags:
      - -s -w
      - -X github.com/enterpilot/gomodel/internal/version.Version={{.Version}}
      - -X github.com/enterpilot/gomodel/internal/version.Commit={{.Commit}}
      - -X github.com/enterpilot/gomodel/internal/version.Date={{.Date}}

archives:
  - formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        formats: ['zip']

checksum:
  name_template: "checksums.txt"

release:
  replace_existing_draft: true

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  groups:
    - title: "Breaking Changes"
      regexp: '^[a-z]+(\([^)]+\))?!:'
      order: 0
    - title: "Features"
      regexp: '^feat(\([^)]+\))?:'
      order: 1
    - title: "Bug Fixes"
      regexp: '^fix(\([^)]+\))?:'
      order: 2
    - title: "Performance"
      regexp: '^perf(\([^)]+\))?:'
      order: 3
    - title: "Other Changes"
      order: 999
  filters:
    exclude:
      - '^docs(\([^)]+\))?!?:'
      - '^test(\([^)]+\))?!?:'
      - '^ci(\([^)]+\))?!?:'
      - '^build(\([^)]+\))?!?:'
      - '^chore(\([^)]+\))?!?:'
      - '^refactor(\([^)]+\))?!?:'
      - 'Merge pull request'
      - 'Merge branch'
