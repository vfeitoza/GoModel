{{define "model-table-body"}}
<template x-for="group in filteredDisplayModelGroups" :key="group.key">
    <tbody>
        <tr class="provider-group-row">
            <td :colspan="activeCategory === 'embedding' || activeCategory === 'image' ? 3 : (activeCategory === 'all' || activeCategory === 'text_generation' ? 6 : 4)">
                <div class="provider-group-header">
                    <div class="provider-group-meta">
                        <div class="provider-group-title">
                            <span class="mono font-size-md" x-text="group.display_name"></span>
                            <span class="provider-group-type" x-show="group.type_label" x-text="'(' + group.type_label + ')'"></span>
                            <span class="provider-group-count" x-show="group.item_count_label" x-text="group.item_count_label"></span>
                        </div>
                        <div class="provider-group-summary" x-show="group.access_summary" x-text="group.access_summary"></div>
                    </div>
                    <div class="alias-actions-cell model-list-actions">
                        <span class="model-access-state-badge" :class="modelAccessStateClass(group.access)" x-text="modelAccessStateText(group.access)"></span>
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="modelPricingOverridesAvailable && group.provider_name"
                            :class="modelPricingButtonClass(hasProviderPricingOverride(group))"
                            :aria-label="modelPricingButtonLabel('provider pricing for ' + group.display_name, hasProviderPricingOverride(group))"
                            :title="modelPricingButtonLabel('provider pricing for ' + group.display_name, hasProviderPricingOverride(group))"
                            @click="openProviderPricingOverrideEdit(group)">
                            {{template "dollar-icon"}}
                        </button>
                        <button type="button" class="alias-toggle" x-show="routingStateAvailable && group.provider_name" :class="{ enabled: group.provider_routing_enabled !== false }" @click="toggleProviderEnabled(group)">
                            <span class="alias-toggle-track"><span class="alias-toggle-thumb"></span></span>
                            <span x-text="group.provider_routing_enabled !== false ? 'Provider Active' : 'Provider Disabled'"></span>
                        </button>
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="modelOverridesAvailable && group.access.selector"
                            :class="modelOverrideEditButtonClass(hasAccessOverride(group.access))"
                            :aria-label="modelOverrideEditButtonLabel('provider access for ' + group.display_name, hasAccessOverride(group.access))"
                            :title="modelOverrideEditButtonLabel('provider access for ' + group.display_name, hasAccessOverride(group.access))"
                            @click="openProviderOverrideEdit(group)">
                            {{template "edit-icon"}}
                        </button>
                    </div>
                </div>
            </td>
        </tr>
        <template x-for="row in group.rows" :key="row.key">
            <tr :id="rowAnchorID(row)" :class="displayRowClass(row)">
                <td>
                    <div class="model-name-cell">
                        <div class="model-name-primary">
                            <span class="mono font-size-md" x-text="row.display_name"></span>
                            <span class="alias-kind-badge" x-show="row.is_alias" x-text="row.kind_badge"></span>
                        </div>
                        <div class="model-name-secondary" x-show="row.is_alias">
                            Targets <span class="mono font-size-md" x-text="row.secondary_name"></span>
                        </div>
                        <div class="model-name-secondary" x-show="!row.is_alias && row.masking_alias">
                            Masked by alias to <span class="mono font-size-md" x-text="aliasTargetLabel(row.masking_alias)"></span>
                        </div>
                        <div class="model-name-secondary" x-show="!row.is_alias && row.canonical_model && row.show_canonical_controls">
                            Canonical <span class="mono font-size-md" x-text="row.canonical_model"></span>
                            <span x-show="row.routing_strategy" x-text="' · Strategy: ' + row.routing_strategy"></span>
                            <span x-show="row.candidate_priority !== null" x-text="' · Priority: ' + row.candidate_priority"></span>
                            <span x-show="row.candidate_weight !== null && row.candidate_weight !== 0" x-text="' · Weight: ' + row.candidate_weight"></span>
                            <span x-show="row.is_config_primary" x-text="' · Config Primary'"></span>
                            <span x-show="row.is_effective_candidate" x-text="' · Effective'"></span>
                        </div>
                    </div>
                </td>
                <td x-show="activeCategory === 'all' || activeCategory === 'text_generation'" x-text="(row.model.metadata?.modes ?? []).join(', ') || '-'"></td>
                <td class="col-price" x-show="activeCategory === 'all' || activeCategory === 'text_generation' || activeCategory === 'embedding'" x-text="formatPrice(modelRowPricing(row)?.input_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'all' || activeCategory === 'text_generation'" x-text="formatPrice(modelRowPricing(row)?.output_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'text_generation'" x-text="formatPrice(modelRowPricing(row)?.cached_input_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'image'" x-text="formatPriceFine(modelRowPricing(row)?.per_image)"></td>
                <td class="col-price" x-show="activeCategory === 'audio'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_input)"></td>
                <td class="col-price" x-show="activeCategory === 'audio'" x-text="formatPriceFine(modelRowPricing(row)?.per_character_input)"></td>
                <td class="col-price" x-show="activeCategory === 'video'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_input)"></td>
                <td class="col-price" x-show="activeCategory === 'video'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_output)"></td>
                <td class="col-price" x-show="activeCategory === 'utility'" x-text="formatPriceFine(modelRowPricing(row)?.per_page)"></td>
                <td class="col-price" x-show="activeCategory === 'utility'" x-text="formatPriceFine(modelRowPricing(row)?.per_request)"></td>
                <td class="model-row-actions">
                    <template x-if="row.is_alias">
                        <div class="alias-actions-cell model-list-actions">
                            <button type="button" class="alias-toggle" :class="{ enabled: row.alias.enabled !== false }" :disabled="aliasTogglingName === row.alias.name" @click="toggleAliasEnabled(row.alias)">
                                <span class="alias-toggle-track"><span class="alias-toggle-thumb"></span></span>
                                <span x-text="aliasTogglingName === row.alias.name ? 'Updating...' : (row.alias.enabled !== false ? 'Active' : 'Disabled')"></span>
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                :aria-label="'Edit alias ' + row.alias.name"
                                :title="'Edit alias ' + row.alias.name"
                                @click="openAliasEdit(row.alias)">
                                {{template "edit-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-action-btn-danger table-icon-btn"
                                :disabled="aliasDeletingName === row.alias.name"
                                :aria-label="aliasDeletingName === row.alias.name ? 'Removing alias ' + row.alias.name : 'Delete alias ' + row.alias.name"
                                :title="aliasDeletingName === row.alias.name ? 'Removing alias ' + row.alias.name : 'Delete alias ' + row.alias.name"
                                @click="deleteAlias(row.alias)">
                                {{template "x-icon"}}
                            </button>
                        </div>
                    </template>
                    <template x-if="!row.is_alias">
                        <div class="alias-actions-cell model-list-actions">
                            <span class="model-access-state-badge" :class="modelAccessStateClass(row.access)" x-text="modelAccessStateText(row.access)"></span>
                            <span class="model-access-state-badge" x-show="row.canonical_model && row.show_canonical_controls" :class="row.canonical_enabled === false ? 'is-disabled' : (row.canonical_status === 'degraded' ? 'is-restricted' : 'is-enabled')" x-text="row.canonical_enabled === false ? 'Canonical Disabled' : (row.canonical_status === 'degraded' ? 'Canonical Degraded' : 'Canonical Enabled')"></span>
                            <span class="model-access-state-badge" x-show="row.routing_state" :class="row.routing_state && row.routing_state.status === 'disabled_manual' ? 'is-disabled' : (row.routing_state && row.routing_state.status === 'degraded_runtime' ? 'is-restricted' : 'is-enabled')" x-text="row.routing_state && row.routing_state.status === 'disabled_manual' ? 'Candidate Disabled' : (row.routing_state && row.routing_state.status === 'degraded_runtime' ? 'Candidate Degraded' : (row.routing_state ? 'Candidate Enabled' : ''))"></span>
                            <span class="model-access-state-badge" x-show="row.is_effective_candidate" :class="'is-enabled'" x-text="'Effective Candidate'"></span>
                            <span class="model-access-state-badge" x-show="row.is_config_primary && !row.is_effective_candidate" :class="'is-restricted'" x-text="'Config Primary'"></span>
                            <button type="button" class="alias-toggle" x-show="routingStateAvailable && row.canonical_model && row.show_canonical_controls" :class="{ enabled: row.canonical_enabled !== false }" @click="toggleCanonicalModelEnabled(row)">
                                <span class="alias-toggle-track"><span class="alias-toggle-thumb"></span></span>
                                <span x-text="row.canonical_enabled === false ? 'Canonical Disabled' : 'Canonical Active'"></span>
                            </button>
                            <button type="button" class="alias-toggle" x-show="routingStateAvailable && row.routing_state" :class="{ enabled: !(row.routing_state && row.routing_state.candidate_enabled === false) }" @click="togglePoolCandidateEnabled(row)">
                                <span class="alias-toggle-track"><span class="alias-toggle-thumb"></span></span>
                                <span x-text="row.routing_state && row.routing_state.candidate_enabled === false ? 'Candidate Disabled' : 'Candidate Active'"></span>
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="modelPricingOverridesAvailable"
                                :class="modelPricingButtonClass(hasModelPricingOverride(row))"
                                :aria-label="modelPricingButtonLabel('model pricing for ' + row.display_name, hasModelPricingOverride(row))"
                                :title="modelPricingButtonLabel('model pricing for ' + row.display_name, hasModelPricingOverride(row))"
                                @click="openModelPricingOverrideEdit(row)">
                                {{template "dollar-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="modelOverridesAvailable"
                                :class="modelOverrideEditButtonClass(hasAccessOverride(row.access))"
                                :aria-label="modelOverrideEditButtonLabel('model access for ' + row.display_name, hasAccessOverride(row.access))"
                                :title="modelOverrideEditButtonLabel('model access for ' + row.display_name, hasAccessOverride(row.access))"
                                @click="openModelOverrideEdit(row)">
                                {{template "edit-icon"}}
                            </button>
                        </div>
                    </template>
                </td>
            </tr>
        </template>
    </tbody>
</template>
{{end}}
