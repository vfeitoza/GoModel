{{define "dashboard-page-oauth"}}
<!-- OAuth Providers Page -->
<template x-if="page==='oauth'">
<div>
<div class="page-header">
    <div class="page-header-content">
        <h2 class="page-title">OAuth Providers</h2>
        <p class="page-subtitle">Manage providers authenticated via OAuth instead of a static API key.</p>
    </div>
    <div class="page-header-actions">
        <button class="pagination-btn pagination-btn-with-icon" @click="oauthRefresh()" :disabled="oauthLoading" aria-label="Refresh OAuth providers" type="button">
            <i data-lucide="refresh-cw" :class="{ 'spin': oauthLoading }" aria-hidden="true"></i>
            Refresh
        </button>
    </div>
</div>

<div class="section">
    <!-- Global error state -->
    <div class="error-state" x-show="oauthGlobalError" role="alert">
        <i data-lucide="alert-circle" class="error-icon" aria-hidden="true"></i>
        <span x-text="oauthGlobalError"></span>
    </div>

    <!-- Loading state -->
    <div class="loading-state" x-show="oauthLoading && oauthProviders.length === 0" aria-live="polite">
        <i data-lucide="loader-2" class="loading-icon spin" aria-hidden="true"></i>
        <span>Loading OAuth providers...</span>
    </div>

    <!-- Empty state -->
    <div class="empty-state" x-show="!oauthLoading && !oauthGlobalError && oauthProviders.length === 0">
        <i data-lucide="fingerprint" class="empty-icon" aria-hidden="true"></i>
        <p class="empty-title">No OAuth providers configured</p>
        <p class="empty-description">
            Add a provider with <code>api_key: "oauth"</code> in your configuration to enable OAuth authentication.
        </p>
        <pre class="empty-code">providers:
  my_claude:
    type: anthropic
    api_key: "oauth"</pre>
    </div>

    <!-- Provider list -->
    <div x-show="oauthProviders.length > 0">
        <template x-for="provider in oauthProviders" :key="provider.provider_name">
            <div class="model-override-item" style="margin-bottom:.75rem;padding:.75rem 1rem">

                <!-- Header row: name + status + actions -->
                <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.4rem">
                    <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
                        <span style="font-weight:600;font-size:.9rem" x-text="provider.provider_name"></span>
                        <span class="model-override-badge"
                              :class="provider.authenticated ? (provider.status === 'expired' ? 'model-override-badge-warning' : 'model-override-badge-active') : 'model-override-badge-inactive'"
                              x-text="oauthStatusLabel(provider)">
                        </span>
                        <span style="font-size:.75rem;opacity:.5" x-text="provider.provider_type || 'anthropic'"></span>
                    </div>
                    <div style="display:flex;gap:.4rem;align-items:center;flex-shrink:0">
                        <!-- Authenticate / Re-authenticate button -->
                        <button class="pagination-btn pagination-btn-primary pagination-btn-with-icon"
                                x-show="!provider.authenticated || provider.status === 'expired'"
                                @click="oauthAuthenticate(provider.provider_name)"
                                :disabled="oauthActiveProvider === provider.provider_name"
                                type="button">
                            <i data-lucide="log-in" aria-hidden="true"></i>
                            <span x-text="oauthActiveProvider === provider.provider_name && !oauthManualProvider ? 'Authenticating...' : (provider.status === 'expired' ? 'Re-authenticate' : 'Authenticate')"></span>
                        </button>
                        <!-- Manual flow button (shown while waiting for local callback) -->
                        <button class="pagination-btn pagination-btn-with-icon"
                                x-show="(!provider.authenticated || provider.status === 'expired') && oauthActiveProvider !== provider.provider_name"
                                @click="oauthAuthenticateManual(provider.provider_name)"
                                type="button"
                                style="font-size:.78rem">
                            <i data-lucide="link" aria-hidden="true"></i>
                            Remote
                        </button>
                        <!-- Disconnect button -->
                        <button class="pagination-btn pagination-btn-danger-outline pagination-btn-with-icon"
                                x-show="provider.authenticated && provider.status !== 'expired'"
                                @click="oauthRevoke(provider.provider_name)"
                                :disabled="oauthRevokingProvider === provider.provider_name"
                                type="button">
                            <i data-lucide="log-out" aria-hidden="true"></i>
                            <span x-text="oauthRevokingProvider === provider.provider_name ? 'Disconnecting...' : 'Disconnect'"></span>
                        </button>
                    </div>
                </div>

                <!-- Manual callback input (remote mode) -->
                <div x-show="oauthManualProvider === provider.provider_name"
                     style="margin-top:.6rem;padding:.6rem .75rem;border:1px solid var(--border);border-radius:6px;background:var(--bg-surface)">
                    <p style="font-size:.8rem;margin:0 0 .4rem;opacity:.8">
                        After authorizing, copy the full URL from the browser address bar and paste it below:
                    </p>
                    <div style="display:flex;gap:.4rem;align-items:center">
                        <input type="text"
                               x-model="oauthManualInput"
                               placeholder="https://console.anthropic.com/oauth/code/callback?code=...&state=..."
                               style="flex:1;font-size:.78rem;padding:.3rem .5rem;border:1px solid var(--border);border-radius:4px;background:var(--bg);color:var(--text)"
                               @keydown.enter="oauthSubmitManual(provider.provider_name)" />
                        <button class="pagination-btn pagination-btn-primary"
                                @click="oauthSubmitManual(provider.provider_name)"
                                :disabled="!oauthManualInput.trim()"
                                type="button">Confirm</button>
                        <button class="pagination-btn"
                                @click="oauthCancelManual(provider.provider_name)"
                                type="button">Cancel</button>
                    </div>
                </div>

                <!-- Account details (when authenticated) — compact inline row -->
                <template x-if="provider.authenticated">
                    <div style="margin-top:.5rem;display:flex;flex-wrap:wrap;gap:.75rem;font-size:.78rem;opacity:.8">
                        <span x-show="provider.account_email">
                            <span style="opacity:.6">Account:</span>
                            <span x-text="provider.account_email"></span>
                        </span>
                        <span x-show="provider.display_name">
                            <span style="opacity:.6">Name:</span>
                            <span x-text="provider.display_name"></span>
                        </span>
                        <span x-show="provider.subscription_type">
                            <span style="opacity:.6">Plan:</span>
                            <span x-text="oauthSubscriptionLabel(provider.subscription_type)"></span>
                        </span>
                        <span x-show="provider.token_expires_at">
                            <span style="opacity:.6">Expires:</span>
                            <span x-text="oauthExpiresLabel(provider.token_expires_at)" :title="provider.token_expires_at"></span>
                        </span>
                    </div>
                </template>

                <!-- Usage section (when authenticated) -->
                <template x-if="provider.authenticated">
                    <div style="margin-top:.5rem">
                        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem">
                            <span style="font-size:.75rem;opacity:.5">Usage</span>
                            <button class="pagination-btn pagination-btn-with-icon"
                                    @click="oauthLoadUsage(provider.provider_name)"
                                    :disabled="oauthUsageLoading[provider.provider_name]"
                                    type="button"
                                    style="font-size:.7rem;padding:.15rem .4rem">
                                <i data-lucide="refresh-cw" :class="{ 'spin': oauthUsageLoading[provider.provider_name] }" aria-hidden="true"></i>
                                Refresh
                            </button>
                        </div>

                        <template x-if="oauthUsage[provider.provider_name]">
                            <div style="display:flex;flex-direction:column;gap:.35rem">
                                <!-- 5-hour window -->
                                <template x-if="oauthUsage[provider.provider_name].five_hour">
                                    <div>
                                        <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.2rem">
                                            <span style="opacity:.7">5-hour window</span>
                                            <span x-text="oauthUsage[provider.provider_name].five_hour.utilization_percent + '%'"></span>
                                        </div>
                                        <div class="progress-track" role="progressbar"
                                             :aria-valuenow="oauthUsage[provider.provider_name].five_hour.utilization_percent"
                                             aria-valuemin="0" aria-valuemax="100">
                                            <div class="progress-fill"
                                                 :class="oauthProgressClass(oauthUsage[provider.provider_name].five_hour.utilization_percent)"
                                                 :style="'width:' + oauthUsage[provider.provider_name].five_hour.utilization_percent + '%'">
                                            </div>
                                        </div>
                                        <div style="font-size:.7rem;opacity:.5;margin-top:.15rem"
                                             x-show="oauthUsage[provider.provider_name].five_hour.resets_at"
                                             x-text="'Resets ' + oauthResetLabel(oauthUsage[provider.provider_name].five_hour.resets_at)">
                                        </div>
                                    </div>
                                </template>

                                <!-- 7-day window -->
                                <template x-if="oauthUsage[provider.provider_name].seven_day">
                                    <div>
                                        <div style="display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:.2rem">
                                            <span style="opacity:.7">7-day window</span>
                                            <span x-text="oauthUsage[provider.provider_name].seven_day.utilization_percent + '%'"></span>
                                        </div>
                                        <div class="progress-track" role="progressbar"
                                             :aria-valuenow="oauthUsage[provider.provider_name].seven_day.utilization_percent"
                                             aria-valuemin="0" aria-valuemax="100">
                                            <div class="progress-fill"
                                                 :class="oauthProgressClass(oauthUsage[provider.provider_name].seven_day.utilization_percent)"
                                                 :style="'width:' + oauthUsage[provider.provider_name].seven_day.utilization_percent + '%'">
                                            </div>
                                        </div>
                                        <div style="font-size:.7rem;opacity:.5;margin-top:.15rem"
                                             x-show="oauthUsage[provider.provider_name].seven_day.resets_at"
                                             x-text="'Resets ' + oauthResetLabel(oauthUsage[provider.provider_name].seven_day.resets_at)">
                                        </div>
                                    </div>
                                </template>

                                <!-- Extra credits -->
                                <template x-if="oauthUsage[provider.provider_name].extra_usage">
                                    <div style="font-size:.75rem;display:flex;justify-content:space-between;opacity:.8">
                                        <span>Extra credits</span>
                                        <span x-text="oauthExtraUsageLabel(oauthUsage[provider.provider_name].extra_usage)"></span>
                                    </div>
                                </template>

                                <div style="font-size:.7rem;opacity:.4"
                                     x-show="oauthUsage[provider.provider_name].fetched_at"
                                     x-text="'Updated ' + oauthResetLabel(oauthUsage[provider.provider_name].fetched_at)">
                                </div>
                            </div>
                        </template>

                        <div x-show="!oauthUsage[provider.provider_name] && !oauthUsageLoading[provider.provider_name]"
                             style="font-size:.75rem;opacity:.5">
                            <button class="pagination-btn" type="button" @click="oauthLoadUsage(provider.provider_name)"
                                    style="font-size:.75rem;padding:.15rem .4rem">Load usage</button>
                        </div>
                    </div>
                </template>

                <!-- Per-provider error -->
                <div x-show="oauthErrors[provider.provider_name]"
                     style="margin-top:.4rem;color:var(--color-error,#ef4444);font-size:.8rem;display:flex;align-items:center;gap:.35rem"
                     role="alert">
                    <i data-lucide="alert-circle" style="width:13px;height:13px" aria-hidden="true"></i>
                    <span x-text="oauthErrors[provider.provider_name]"></span>
                </div>

            </div>
        </template>
    </div>
</div>

<!-- Endpoint hint (when at least one provider is authenticated) -->
<div class="section" x-show="oauthProviders.some(p => p.authenticated)">
    <div class="info-box">
        <i data-lucide="info" class="info-icon" aria-hidden="true"></i>
        <div>
            <p class="info-title">Using OAuth providers</p>
            <p class="info-text">Send requests via the passthrough route:</p>
            <template x-for="p in oauthProviders.filter(p => p.authenticated)" :key="p.provider_name">
                <p style="margin:.2rem 0">
                    <code x-text="'POST /p/' + p.provider_name + '/v1/chat/completions'"></code>
                </p>
            </template>
        </div>
    </div>
</div>
</div>
</template>
{{end}}
