{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoModel Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="{{assetURL "favicon.svg"}}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js" integrity="sha384-XcdcwHqIPULERb2yDEM4R0XaQKU3YnDsrTmjACBZyfdVVqjh6xQ4/DCMd7XLcA6Y" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.8/dist/cdn.min.js" integrity="sha384-LXWjKwDZz29o7TduNe+r/UxaolHh5FsSvy2W7bDHSZ8jJeGgDeuNnsDNHoxpSgDi" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{{assetURL "css/dashboard.css"}}">
    <script>
        (function () {
            const basePath = "{{.BasePath}}";
            window.GOMODEL_BASE_PATH = basePath;
            window.gomodelPath = function (urlPath) {
                if (!urlPath || urlPath.charAt(0) !== "/" || urlPath.indexOf("//") === 0 || basePath === "/") {
                    return urlPath;
                }
                if (urlPath === basePath || urlPath.indexOf(basePath + "/") === 0) {
                    return urlPath;
                }
                return basePath + urlPath;
            };
            function sameOriginURLWithBasePath(rawURL) {
                if (typeof URL !== "function") {
                    return rawURL;
                }
                const url = new URL(rawURL, window.location.href);
                if (url.origin !== window.location.origin) {
                    return rawURL;
                }
                const nextPath = window.gomodelPath(url.pathname);
                if (nextPath === url.pathname) {
                    return rawURL;
                }
                url.pathname = nextPath;
                return url.toString();
            }
            if (basePath !== "/" && typeof window.fetch === "function") {
                const rawFetch = window.fetch.bind(window);
                window.fetch = function (input, init) {
                    if (typeof input === "string") {
                        return rawFetch(window.gomodelPath(input), init);
                    }
                    if (typeof URL === "function" && input instanceof URL) {
                        return rawFetch(new URL(sameOriginURLWithBasePath(input.toString())), init);
                    }
                    if (typeof Request === "function" && input instanceof Request) {
                        const nextURL = sameOriginURLWithBasePath(input.url);
                        if (nextURL !== input.url) {
                            return rawFetch(new Request(nextURL, input), init);
                        }
                    }
                    return rawFetch(input, init);
                };
            }
            if (basePath !== "/" && window.history) {
                ["pushState", "replaceState"].forEach(function (method) {
                    if (typeof window.history[method] !== "function") {
                        return;
                    }
                    const rawHistoryMethod = window.history[method].bind(window.history);
                    window.history[method] = function (state, title, url) {
                        if (typeof url === "string") {
                            return rawHistoryMethod(state, title, window.gomodelPath(url));
                        }
                        return rawHistoryMethod(state, title, url);
                    };
                });
            }
        })();
    </script>
</head>
<body x-data="dashboard()" :class="{ 'dashboard-modal-open': overlayDialogOpen() }">
    <div class="app">
        {{template "sidebar" .}}
        <main class="content">
            {{template "index" .}}
        </main>
        <div class="auth-dialog-backdrop"
             x-cloak
             x-show="authDialogOpen"
             x-transition.opacity.duration.160ms
             aria-hidden="true"></div>
        <div class="auth-dialog-shell"
             x-cloak
             x-show="authDialogOpen"
             x-transition.opacity.duration.160ms
             @click="closeAuthDialog()"
             @keydown.escape.window="authDialogOpen && closeAuthDialog()">
            <section class="auth-dialog"
                     role="dialog"
                     aria-modal="true"
                     aria-labelledby="authDialogTitle"
                     @click.stop>
                <div class="auth-dialog-header">
                    <div>
                        <h2 id="authDialogTitle" x-text="needsAuth ? 'Dashboard locked' : 'Change API key'">Dashboard locked</h2>
                    </div>
                    <button type="button" class="auth-dialog-close dialog-close-btn" aria-label="Close authentication dialog" @click="closeAuthDialog()">
                        {{template "x-icon"}}
                    </button>
                </div>
                <form class="auth-dialog-form" @submit.prevent="submitApiKey()">
                    <div class="auth-dialog-input-shell">
                        <i data-lucide="lock-keyhole" class="auth-dialog-input-icon" aria-hidden="true"></i>
                        <input id="authDialogApiKey"
                               class="auth-dialog-input"
                               type="password"
                               placeholder="Master key or bearer token"
                               aria-label="API key"
                               autocomplete="current-password"
                               x-model="apiKey">
                    </div>
                    <p class="auth-dialog-error" x-show="authError" role="alert">
                        Enter a valid API key to continue.
                    </p>
                    <p class="auth-dialog-hint">Stored in this browser. Requests use the Authorization bearer header.</p>
                    <div class="auth-dialog-actions">
                        <button type="submit"
                                class="pagination-btn pagination-btn-primary pagination-btn-with-icon auth-dialog-submit-btn">
                            <i data-lucide="check" class="auth-dialog-submit-icon" aria-hidden="true"></i>
                            <span x-text="needsAuth ? 'Unlock dashboard' : 'Save API key'">Unlock dashboard</span>
                        </button>
                    </div>
                </form>
            </section>
        </div>
        {{template "typed-confirmation-dialog" .}}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.577.0/dist/umd/lucide.min.js" integrity="sha384-orgVf2eX2+m1zKAOIi09hD0W6GtVhoOUmqDK+sysYB2JTZ4vS86j4jm+X7a4Nnei" crossorigin="anonymous"></script>
    <script src="{{assetURL "js/modules/conversation-helpers.js"}}"></script>
    <script src="{{assetURL "js/modules/icons.js"}}"></script>
    <script src="{{assetURL "js/modules/clipboard.js"}}"></script>
    <script src="{{assetURL "js/modules/timezone.js"}}"></script>
    <script src="{{assetURL "js/modules/date-picker.js"}}"></script>
    <script src="{{assetURL "js/modules/providers.js"}}"></script>
    <script src="{{assetURL "js/modules/usage.js"}}"></script>
    <script src="{{assetURL "js/modules/audit-list.js"}}"></script>
    <script src="{{assetURL "js/modules/live-logs.js"}}"></script>
    <script src="{{assetURL "js/modules/aliases.js"}}"></script>
    <script src="{{assetURL "js/modules/provider-overrides.js"}}"></script>
    <script src="{{assetURL "js/modules/model-pricing-overrides.js"}}"></script>
    <script src="{{assetURL "js/modules/workflows.js"}}"></script>
    <script src="{{assetURL "js/modules/auth-keys.js"}}"></script>
    <script src="{{assetURL "js/modules/guardrails.js"}}"></script>
    <script src="{{assetURL "js/modules/budgets.js"}}"></script>
    <script src="{{assetURL "js/modules/pricing.js"}}"></script>
    <script src="{{assetURL "js/modules/conversation-drawer.js"}}"></script>
    <script src="{{assetURL "js/modules/contribution-calendar.js"}}"></script>
    <script src="{{assetURL "js/modules/charts.js"}}"></script>
    <script src="{{assetURL "js/dashboard.js"}}"></script>
</body>
</html>{{end}}
