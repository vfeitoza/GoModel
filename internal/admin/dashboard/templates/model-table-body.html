{{define "model-table-body"}}
<template x-for="group in filteredDisplayModelGroups" :key="group.key">
    <tbody>
        <tr class="provider-group-row">
            <td :colspan="activeCategory === 'embedding' || activeCategory === 'image' ? 3 : (activeCategory === 'text_generation' ? 5 : (activeCategory === 'all' ? 4 : 4))">
                <div class="provider-group-header">
                    <div class="provider-group-meta">
                        <div class="provider-group-title">
                            <span class="mono font-size-md" x-text="group.display_name"></span>
                            <span class="provider-group-type" x-show="group.type_label" x-text="'(' + group.type_label + ')'"></span>
                            <span class="provider-group-count" x-show="group.item_count_label" x-text="group.item_count_label"></span>
                        </div>
                        <div class="provider-group-summary" x-show="group.access_summary" x-text="group.access_summary"></div>
                    </div>
                    <div class="alias-actions-cell model-list-actions">
                        <template x-if="group.access.selector">
                            {{template "access-toggle" "group"}}
                        </template>
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="modelPricingOverridesAvailable && group.provider_name"
                            :class="modelPricingButtonClass(hasProviderPricingOverride(group))"
                            :aria-label="modelPricingButtonLabel('provider pricing for ' + group.display_name, hasProviderPricingOverride(group))"
                            :title="modelPricingButtonLabel('provider pricing for ' + group.display_name, hasProviderPricingOverride(group))"
                            @click="openProviderPricingOverrideEdit(group)">
                            {{template "dollar-icon"}}
                        </button>
                        <button type="button" class="table-action-btn table-icon-btn"
                            x-show="virtualModelsAvailable && group.access.selector"
                            :class="modelOverrideEditButtonClass(hasAccessOverride(group.access))"
                            :aria-label="modelOverrideEditButtonLabel('provider access for ' + group.display_name, hasAccessOverride(group.access))"
                            :title="modelOverrideEditButtonLabel('provider access for ' + group.display_name, hasAccessOverride(group.access))"
                            @click="openProviderOverrideEdit(group)">
                            {{template "edit-icon"}}
                        </button>
                    </div>
                </div>
            </td>
        </tr>
        <template x-for="row in group.rows" :key="row.key">
            <tr :id="rowAnchorID(row)" :class="displayRowClass(row)">
                <td>
                    <div class="model-name-cell">
                        <div class="model-name-primary">
                            <span class="mono font-size-md" x-text="row.display_name"></span>
                            <span class="alias-kind-badge" x-show="row.is_alias" x-text="row.kind_badge"></span>
                            <span class="alias-kind-badge" x-show="!row.is_alias && rowVirtualBadge(row)" x-text="rowVirtualBadge(row)"></span>
                            <span class="alias-kind-badge" x-show="rowIsManaged(row)" title="Managed by config.yaml / VIRTUAL_MODELS">Config</span>
                        </div>
                        <div class="model-name-secondary" x-show="row.is_alias">
                            Targets <span class="mono font-size-md" x-text="row.secondary_name"></span>
                        </div>
                        <div class="model-name-secondary" x-show="!row.is_alias && row.masking_alias">
                            Redirects to <span class="mono font-size-md" x-text="aliasTargetLabel(row.masking_alias)"></span>
                        </div>
                    </div>
                </td>
                <td x-show="activeCategory === 'all' || activeCategory === 'text_generation'" x-text="(row.model.metadata?.modes ?? []).join(', ') || '-'"></td>
                <td class="col-price" x-show="activeCategory === 'all' || activeCategory === 'text_generation'" x-text="formatPrice(modelRowPricing(row)?.input_per_mtok) + ' / ' + formatPrice(modelRowPricing(row)?.output_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'embedding'" x-text="formatPrice(modelRowPricing(row)?.input_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'text_generation'" x-text="formatPrice(modelRowPricing(row)?.cached_input_per_mtok)"></td>
                <td class="col-price" x-show="activeCategory === 'image'" x-text="formatPriceFine(modelRowPricing(row)?.per_image)"></td>
                <td class="col-price" x-show="activeCategory === 'audio'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_input)"></td>
                <td class="col-price" x-show="activeCategory === 'audio'" x-text="formatPriceFine(modelRowPricing(row)?.per_character_input)"></td>
                <td class="col-price" x-show="activeCategory === 'video'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_input)"></td>
                <td class="col-price" x-show="activeCategory === 'video'" x-text="formatPriceFine(modelRowPricing(row)?.per_second_output)"></td>
                <td class="col-price" x-show="activeCategory === 'utility'" x-text="formatPriceFine(modelRowPricing(row)?.per_page)"></td>
                <td class="col-price" x-show="activeCategory === 'utility'" x-text="formatPriceFine(modelRowPricing(row)?.per_request)"></td>
                <td class="model-row-actions">
                    <template x-if="row.is_alias">
                        <div class="alias-actions-cell model-list-actions">
                            {{template "access-toggle" "row"}}
                            <button type="button" class="table-action-btn table-action-btn-danger table-icon-btn"
                                x-show="virtualModelsAvailable && aliasRowCanRemove(row)"
                                :aria-label="rowDeletingKey === row.key ? 'Removing alias ' + row.alias.name : 'Remove alias ' + row.alias.name"
                                :title="rowDeletingKey === row.key ? 'Removing alias ' + row.alias.name : 'Remove alias ' + row.alias.name"
                                :disabled="Boolean(rowDeletingKey)"
                                @click="removeAliasRow(row)">
                                {{template "trash-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="virtualModelsAvailable"
                                :aria-label="'Edit alias ' + row.alias.name"
                                :title="'Edit alias ' + row.alias.name"
                                @click="openVirtualModelEditAlias(row.alias)">
                                {{template "edit-icon"}}
                            </button>
                        </div>
                    </template>
                    <template x-if="!row.is_alias">
                        <div class="alias-actions-cell model-list-actions">
                            {{template "access-toggle" "row"}}
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="modelPricingOverridesAvailable"
                                :class="modelPricingButtonClass(hasModelPricingOverride(row))"
                                :aria-label="modelPricingButtonLabel('model pricing for ' + row.display_name, hasModelPricingOverride(row))"
                                :title="modelPricingButtonLabel('model pricing for ' + row.display_name, hasModelPricingOverride(row))"
                                @click="openModelPricingOverrideEdit(row)">
                                {{template "dollar-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="virtualModelsAvailable && row.masking_alias && row.masking_alias.name"
                                :aria-label="'Edit redirect for ' + row.display_name"
                                :title="'Edit redirect for ' + row.display_name"
                                @click="openVirtualModelEditAlias(row.masking_alias)">
                                {{template "edit-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-action-btn-danger table-icon-btn"
                                x-show="virtualModelsAvailable && rowRedirectCanRemove(row)"
                                :aria-label="rowDeletingKey === row.key ? 'Removing redirect for ' + row.display_name : 'Remove redirect for ' + row.display_name"
                                :title="rowDeletingKey === row.key ? 'Removing redirect for ' + row.display_name : 'Remove redirect for ' + row.display_name"
                                :disabled="Boolean(rowDeletingKey)"
                                @click="removeRedirectRow(row)">
                                {{template "trash-icon"}}
                            </button>
                            <button type="button" class="table-action-btn table-icon-btn"
                                x-show="virtualModelsAvailable && !row.masking_alias"
                                :class="modelOverrideEditButtonClass(hasAccessOverride(row.access))"
                                :aria-label="modelOverrideEditButtonLabel('model access for ' + row.display_name, hasAccessOverride(row.access))"
                                :title="modelOverrideEditButtonLabel('model access for ' + row.display_name, hasAccessOverride(row.access))"
                                @click="openVirtualModelEditModel(row)">
                                {{template "edit-icon"}}
                            </button>
                        </div>
                    </template>
                </td>
            </tr>
        </template>
    </tbody>
</template>
{{end}}
